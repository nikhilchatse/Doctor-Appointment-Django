{% extends 'base.html' %}

{% block content %}
<h2>Edit Profile</h2>
<form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    
    <h4>Account Details</h4>
    {{ user_form.as_p }}
    
    <hr>
    
    <h4>Professional / Personal Details</h4>
    {{ profile_form.as_p }}
    
    <button type="submit" class="btn btn-primary">Save Changes</button>
</form>
{% endblock %}
