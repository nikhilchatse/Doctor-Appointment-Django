<!DOCTYPE html>
<html>
<head>
    <title>Clinic App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style type="text/tailwindcss">
        @layer components {
            .alert-error, .alert-danger {
                @apply bg-red-100 text-red-800 border border-red-200;
            }
            .alert-success {
                @apply bg-green-100 text-green-800 border border-green-200;
            }
            .alert-warning {
                @apply bg-yellow-100 text-yellow-800 border border-yellow-200;
            }
            .alert-info {
                @apply bg-cyan-100 text-cyan-800 border border-cyan-200;
            }
        }
    </style>
    <style>
        .auth-wrapper {
            min-height: calc(100vh - 70px);
        }
        .auth-card {
            border-radius: 15px;
        }
        .side-panel {
            background: linear-gradient(135deg, #0284c7, #0d9488);
            color: white;
            border-radius: 15px 0 0 15px;
        }
    </style>
</head>
<body class="bg-slate-50 font-sans antialiased text-slate-800">

<nav class="bg-gradient-to-r from-cyan-600 to-teal-600 shadow-md">
    <div class="container mx-auto px-4">
        <div class="flex justify-between h-16 items-center">
            <a class="text-white font-bold text-xl tracking-tight" href="/">Clinic App</a>
            <div class="flex items-center space-x-1 sm:space-x-4">
                {% if user.is_authenticated %}
                    <span class="text-teal-50 px-3 py-2 text-sm font-medium hidden sm:inline-block">Hello, {{ user.username }}</span>
                    <a class="text-white hover:bg-white/20 px-3 py-2 rounded-md text-sm font-medium transition-colors" href="{% url 'logout' %}">Logout</a>
                {% else %}
                    <a class="text-white hover:bg-white/20 px-3 py-2 rounded-md text-sm font-medium transition-colors" href="{% url 'login' %}">Login</a>
                    <a class="bg-white text-teal-600 hover:bg-teal-50 px-4 py-2 rounded-md text-sm font-semibold shadow-sm transition-colors" href="{% url 'patient_signup' %}">Patient Signup</a>
                {% endif %}
            </div>
        </div>
    </div>
</nav>

{% if messages %}
    <div class="container mx-auto px-4 mt-4">
        {% for message in messages %}
        <div class="alert alert-{{ message.tags }} p-4 mb-4 rounded-lg flex justify-between items-center shadow-sm" role="alert">
            <div class="text-sm font-medium">{{ message }}</div>
            <button type="button" class="text-current opacity-70 hover:opacity-100 transition-opacity text-2xl leading-none" onclick="this.parentElement.style.display='none'">&times;</button>
        </div>
        {% endfor %}
    </div>
{% endif %}


<div class="container mx-auto px-4 auth-wrapper flex justify-center items-center">
    {% block content %}
    
    {% endblock %}
</div>


<script>
  setTimeout(() => {
    document.querySelectorAll('.alert').forEach(alert => {
      alert.style.display = 'none';
    });
  }, 3000);
</script>

</body>
</html>
