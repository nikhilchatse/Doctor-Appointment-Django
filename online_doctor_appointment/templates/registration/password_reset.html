{% extends 'base.html' %}
{% block content %}
<h2>Forgot Password?</h2>
<p>Enter your email address below, and we'll email instructions for setting a new one.</p>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-primary">Send Email</button>
</form>
{% endblock %}
