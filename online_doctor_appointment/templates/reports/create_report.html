{% extends 'base.html' %}

{% block content %}
<style type="text/tailwindcss">
    .django-form input, .django-form select, .django-form text, .django-form textarea {
        @apply w-full border border-gray-300 rounded-lg px-4 py-3 mt-1 text-gray-700 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 transition-colors bg-gray-50 focus:bg-white;
    }
    .django-form label {
        @apply block text-sm font-semibold text-gray-700 mb-1 mt-4;
    }
    .django-form input[type="file"] {
        @apply p-0 border-0 bg-transparent file:mr-4 file:py-2 file:px-4 file:rounded-xl file:border-0 file:text-sm file:font-bold file:bg-emerald-50 file:text-emerald-700 hover:file:bg-emerald-100 cursor-pointer w-full;
    }
</style>

<div class="w-full max-w-2xl mx-auto p-4 sm:p-6 lg:p-8 mt-4 md:mt-8">
    <div class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
        <div class="bg-slate-800 text-white p-6 md:p-8">
            <h2 class="text-2xl font-bold tracking-tight">Write Prescription</h2>
            <p class="text-slate-300 mt-2 font-light">Patient: <strong class="text-white font-semibold">{{ appointment.patient.first_name }}</strong></p>
        </div>
        
        <div class="p-6 md:p-8">
            <form method="post" enctype="multipart/form-data" class="django-form mt-2">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3.5 px-4 rounded-xl shadow-md transition-all transform hover:-translate-y-0.5 mt-8 text-lg tracking-wide">Save & Finish Appointment</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
