{% extends 'base.html' %}

{% block content %}

<style type="text/tailwindcss">
    .django-form input, .django-form select, .django-form textarea {
        @apply w-full border border-gray-300 rounded-lg px-4 py-3 text-gray-700 focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-teal-500 transition-colors bg-gray-50 focus:bg-white;
    }
</style>

<div class="w-full max-w-lg mx-auto p-4 sm:p-6 lg:p-8 mt-4 md:mt-10">
    <div class="bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-100">
        <div class="bg-gradient-to-r from-cyan-600 to-teal-600 text-white p-6 md:p-8 text-center relative overflow-hidden">
            <div class="absolute inset-0 bg-white/10 mix-blend-overlay"></div>
            <h2 class="text-3xl font-extrabold relative z-10">Book Appointment</h2>
            <p class="text-cyan-50 mt-2 font-medium text-lg relative z-10">with Dr. {{ doctor.user.last_name }}</p>
        </div>
        
        <div class="p-6 md:p-8">
            <form method="post" class="django-form">
                {% csrf_token %}
                
                <div class="mb-5">
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Select Date</label>
                    {{ form.appointment_date }}
                </div>
                
                <div class="mb-5">
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Select Time</label>
                    {{ form.appointment_time }}
                </div>
                
                <div class="mb-8">
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Describe Symptoms</label>
                    {{ form.symptoms }}
                </div>

                <button type="submit" class="w-full bg-teal-600 hover:bg-teal-700 text-white font-bold py-3.5 px-4 rounded-xl shadow-md transition-all transform hover:-translate-y-0.5 text-lg tracking-wide">Confirm Booking</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
